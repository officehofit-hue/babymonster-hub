name: Daily BABYMONSTER News Update

on:
  schedule:
    # Runs every day at 06:00 UTC (09:00 Israel time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest news
        run: python scripts/fetch_news.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet data/news.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updates
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "BABYMONSTER Hub Bot"
          git config user.email "actions@github.com"
          git add data/news.json
          git commit -m "Daily news update — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
